<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Cadastro</title>
    <style>
        body {
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            background-color: #3498db;
            color: #fff;
            padding: 20px;
            margin-top: 0;
        }

        form {
            background-color: #fff;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
        }

        label {
            display: block;
            text-align: left;
            font-weight: bold;
            margin-top: 10px;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="tel"],
        input[type="url"],
        input[type="date"],
        input[type="datetime-local"],
        textarea,
        select,
        input[type="color"],
        input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        input[type="range"] {
            width: 100%;
            margin-bottom: 10px;
        }

        input[type="submit"],
        input[type="reset"] {
            background-color: #3498db;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        input[type="submit"]:hover,
        input[type="reset"]:hover {
            background-color: #2980b9;
        }
    </style>
</head>

<body>
    <h1>Formulário de Cadastro</h1>
    <form action="Concluido.htm" method="POST">
        <label for="NOME">Nome</label>
        <input type="text" name="NOME" id="NOME" placeholder="Seu Nome Completo" required>
        <label for="CPF">CPF</label>
        <input type="text" name="CPF" id="CPF" placeholder="111.222.333-44" required>
        <label for="email">E-mail</label>
        <input type="email" name="email" id="email" placeholder="email321@gmail.com">
        <label for="tel">Celular</label>
        <input type="tel" name="telefone" id="telefone" placeholder="(99) 9999-9999">
        <input type="submit" value="Cadastrar"> </form>
    </form>
    <script>
        const colorInput = document.getElementById('cor');
        const colorPreview = document.getElementById('cor-preview');

        colorInput.addEventListener('input', function() {
            colorPreview.style.backgroundColor = colorInput.value;
        });
    </script>
</body>
</html>
